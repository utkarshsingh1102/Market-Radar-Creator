<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Market Radar Forge{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #F5C518;
      --black: #0d0d0d;
      --white: #ffffff;
      --gray-50: #f9f9f9;
      --gray-100: #f0f0f0;
      --gray-200: #e0e0e0;
      --gray-400: #aaa;
      --gray-600: #555;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--black);
      min-height: 100vh;
    }
    header {
      background: var(--black);
      color: var(--white);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      font-size: 18px;
      font-weight: 700;
      background: var(--yellow);
      color: var(--black);
      padding: 4px 14px;
      border-radius: 6px;
    }
    header .subtitle { font-size: 14px; color: var(--gray-400); }

    .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--gray-600); }
    input[type=text], input[type=number], textarea, select {
      width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200);
      border-radius: 8px; font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--black); }
    textarea { min-height: 180px; resize: vertical; font-family: monospace; font-size: 13px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--black); color: var(--white); }
    .btn-secondary { background: var(--gray-100); color: var(--black); }
    .btn-yellow { background: var(--yellow); color: var(--black); }
    .btn-danger { background: #e53e3e; color: var(--white); }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    .field { margin-bottom: 18px; }
    .row { display: flex; gap: 16px; }
    .row .field { flex: 1; }

    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .badge-ok { background: #d4edda; color: #155724; }
    .badge-warn { background: #fff3cd; color: #856404; }
    .badge-error { background: #f8d7da; color: #721c24; }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    .spinner { display: inline-block; width: 16px; height: 16px;
      border: 2px solid #ccc; border-top-color: #333;
      border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <span class="logo">NBG</span>
    <span style="color:white;font-weight:600;font-size:16px;">Market Radar Forge</span>
    <span class="subtitle">— Automated Post Generator</span>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
